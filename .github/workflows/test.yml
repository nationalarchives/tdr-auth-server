name: TDR Run Auth Server Tests
on:
  push:
    branches-ignore:
      - master
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@9214d929d74b527c75cdac14ba96812f90b3ebba # v.0.0.35
    with:
      repo-name: tdr-auth-server
      test-command: |
        npm install
        npm run checks
        sbt scalastyle test
      java-version: '17'
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
