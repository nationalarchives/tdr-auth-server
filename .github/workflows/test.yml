name: TDR Run Auth Server Tests
on:
  push:
    branches-ignore:
      - master
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@f318ce8a5d99c08b1235663f97fdb1b35844674e # v.0.0.39
    with:
      repo-name: tdr-auth-server
      test-command: |
        npm install
        npm run checks
        if [ "${{ github.actor }}" = "tna-da-bot" ]; then
          sbt test
        else
          sbt scalastyle test
        fi
      java-version: '17'
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
