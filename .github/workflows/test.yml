name: TDR Run Auth Server Tests
on:
  push:
    branches-ignore:
      - master
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@e3622e3bbb9019981b3aaf6b278b2fce0c7d812b # v.0.0.40
    with:
      repo-name: tdr-auth-server
      test-command: |
        npm install
        npm run checks
        sbt test
      java-version: '17'
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
