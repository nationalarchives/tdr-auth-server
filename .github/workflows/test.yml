name: TDR Run Auth Server Tests
on:
  push:
    branches-ignore:
      - master
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@2d29c2e83fbaba6554c1e0d8c0b45d2015d610b2 # v.0.0.41
    with:
      repo-name: tdr-auth-server
      test-command: |
        npm install
        npm run checks
        sbt test
      java-version: '17'
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
