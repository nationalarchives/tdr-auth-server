name: TDR Update Auth Server Configuration
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'intg'
      update-policy:
        description: 'The update policy'
        required: true
        default: "SKIP"
permissions:
  id-token: write
jobs:
  update:
    environment: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: role-name
        env:
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh: 
            print(f"role-name=TDRGitHubRunKeycloakUpdateRole{os.environ['INPUT_ENVIRONMENT'].title()}", file=fh)
        shell: python
      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/${{ steps.role-name.outputs.role-name }}
          aws-region: eu-west-2
          role-session-name: RunKeycloakUpdateTask
      - env:
          ACCOUNT_NUMBER: ${{ secrets.ACCOUNT_NUMBER }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          UPDATE_POLICY: ${{ github.event.inputs.update-policy }}
        run: |
          pip install boto3
          python .github/scripts/run_ecs_task.py "$ACCOUNT_NUMBER" "$ENVIRONMENT" "$UPDATE_POLICY"
